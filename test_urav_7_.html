<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Линейные уравнения — Обучение и проверка</title>
    <style>
      :root {
        --bg1: #2c3e50;
        --bg2: #34495e;
        --text: #ecf0f1;
        --muted: #bdc3c7;
        --card: rgba(52, 73, 94, 0.85);
        --border: rgba(236, 240, 241, 0.15);
        --accent: #1abc9c;
        --ok: #27ae60;
        --warn: #dd6b20;
        --bad: #c53030;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        padding: 20px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(
          135deg,
          var(--bg1) 0%,
          var(--bg2) 50%,
          var(--bg1) 100%
        );
        color: var(--text);
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
        font-size: 2.5rem;
        margin: 0 0 40px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      .student-info {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 30px;
        text-align: center;
      }
      .student-name {
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 8px;
      }

      /* Видеоблоки по центру */
      .video-section {
        display: flex;
        justify-content: center; /* Центрируем содержимое по горизонтали */
        align-items: flex-start; /* Выравниваем по верхнему краю */
        gap: 30px; /* Отступы между карточками */
        margin-bottom: 50px;
        flex-wrap: wrap; /* Элементы будут переноситься на новую строку, если не помещаются */
      }

      .video-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        transition: transform 0.3s ease;
        width: 100%; /* Устанавливаем ширину 100% */
        max-width: 360px; /* Максимальная ширина для каждой карточки */
        margin-bottom: 20px; /* Отступ снизу */
        display: flex;
        flex-direction: column; /* Чтобы элементы внутри карточки были вертикально выровнены */
        gap: 15px; /* Отступы между элементами внутри карточки */
      }

      .video-placeholder {
        width: 100%;
        height: 200px;
        background: linear-gradient(45deg, #f0f0f0, #e0e0e0);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 15px;
        border: 2px solid #ddd;
        color: #666;
      }

      .video-title {
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: 12px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Линейные уравнения — Обучение и проверка</h1>

      <!-- Информация о студенте -->
      <div class="student-info">
        <p class="student-name">Имя студента:</p>
        <p>Фамилия Имя Отчество</p>
      </div>

      <!-- Блок с видеоконтентом -->
      <section class="video-section">
        <article class="video-card">
          <div class="video-placeholder">Видео-плейсхолдер</div>
          <h2 class="video-title">Видео №1</h2>
        </article>

        <article class="video-card">
          <div class="video-placeholder">Видео-плейсхолдер</div>
          <h2 class="video-title">Видео №2</h2>
        </article>

        <article class="video-card">
          <div class="video-placeholder">Видео-плейсхолдер</div>
          <h2 class="video-title">Видео №3</h2>
        </article>
      </section>
    </div>
  </body>
</html>
