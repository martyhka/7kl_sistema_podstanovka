<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, Initial-scale=1.0" />
    <title>Линейные уравнения - Обучение и проверка</title>
    <style>
      body {
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 20px;
        background: linear-gradient(
          135deg,
          #2c3e50 0%,
          #34495e 50%,
          #2c3e50 100%
        );
        min-height: 100%;
        color: #ecf0f1;
      }
      html {
        height: 100%;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      h1 {
        text-align: center;
        color: white;
        font-size: 2.5rem;
        margin-bottom: 40px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }
      .student-info {
        background: rgba(52, 73, 94, 0.8);
        border: 1px solid rgba(236, 240, 241, 0.1);
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 30px;
        text-align: center;
      }
      .student-name {
        font-size: 1.3rem;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .video-section {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-bottom: 50px;
        flex-wrap: wrap;
      }
      .video-card {
        background: rgba(52, 73, 94, 0.8);
        border: 1px solid rgba(236, 240, 241, 0.1);
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        transition: transform 0.3s ease;
        max-width: 350px;
      }
      .video-card:hover {
        transform: translateY(-5px);
      }
      .video-placeholder {
        width: 100%;
        height: 200px;
        background: linear-gradient(45deg, #f0f0f0, #e0e0e0);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 15px;
        border: 2px solid #ddd;
      }
      .video-title {
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 15px;
        text-align: center;
        color: #ecf0f1;
      }
      .test-links {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .test-button {
        background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
        color: #ecf0f1;
        border: 1px solid rgba(236, 240, 241, 0.2);
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 500;
        transition: all 0.3s ease;
        text-align: left;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 5px;
        position: relative;
      }
      .test-button:hover {
        transform: translateX(5px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        border-color: rgba(236, 240, 241, 0.4);
      }
      .arrow {
        transition: transform 0.3s ease;
      }
      .test-button.active .arrow {
        transform: rotate(90deg);
      }
      .test-content {
        background: rgba(52, 73, 94, 0.9);
        border: 1px solid rgba(236, 240, 241, 0.1);
        margin: 20px 0;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        display: none;
        animation: slideDown 0.3s ease;
      }
      .test-content.active {
        display: block;
      }
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .test-title {
        font-size: 1.5rem;
        font-weight: bold;
        margin-bottom: 25px;
        text-align: center;
        color: #ecf0f1;
        border-bottom: 2px solid rgba(236, 240, 241, 0.2);
        padding-bottom: 10px;
      }
      .question {
        background: rgba(44, 62, 80, 0.6);
        border-left: 4px solid #1abc9c;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 0 10px 10px 0;
        border: 1px solid rgba(236, 240, 241, 0.1);
      }
      .question-text {
        font-size: 1.1rem;
        margin-bottom: 15px;
        font-weight: 500;
      }
      .answer-input {
        width: 100%;
        max-width: 200px;
        padding: 10px 15px;
        border: 2px solid rgba(236, 240, 241, 0.3);
        border-radius: 8px;
        font-size: 1rem;
        background: rgba(44, 62, 80, 0.8);
        color: #ecf0f1;
        transition: border-color 0.3s ease;
      }
      .answer-input:focus {
        outline: none;
        border-color: #1abc9c;
        box-shadow: 0 0 0 3px rgba(26, 188, 156, 0.2);
      }
      .answer-input::placeholder {
        color: rgba(236, 240, 241, 0.6);
      }
      .check-button {
        background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 1.1rem;
        font-weight: 600;
        margin: 20px auto;
        display: block;
        transition: all 0.3s ease;
      }
      .check-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(72, 187, 120, 0.4);
      }
      .check-button:disabled {
        background: #95a5a6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      .result {
        text-align: center;
        font-size: 1.3rem;
        font-weight: bold;
        margin: 20px;
        border-radius: 10px;
        display: none;
      }
      .result.show {
        display: block;
        animation: fadeIn 0.5s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📐 Линейные уравнения</h1>
      <div class="student-info">
        <div class="student-name">
          Ученик: <span id="studentName">Иван Петров</span>
        </div>
        <div>Класс: 7А | Дата: <span id="currentDate"></span></div>
      </div>
      <div class="video-section">
        <div class="video-card">
          <div class="video-title">Основы линейных данных</div>
          <div class="video-placeholder">
            <!-- Вставьте ссылку на видео здесь -->
            <div style="text-align: center; color: #666">
              🎥<br />Видео урок 1<br />
              <small>Задание: Вставьте описание</small>
            </div>
          </div>
          <div class="test-links">
            <button class="test-button" onclick="toggleTest('test1')">
              <span>Проверочная работа №1</span> <span class="arrow">▶</span>
              <span class="test-status">✓</span>
            </button>
            <!-- Повторите для других тестов -->
          </div>
        </div>
        <!-- Аналогично добавляйте видео карточки -->
      </div>

      <!-- Пример для заданий -->
      <div class="test-content" id="test1">
        <div class="test-title">
          Основы линейных уравнений: Проверочная работа №1
        </div>
        <div class="question">
          <div class="question-text">1. Решите уравнение: 2x + 5 = 13</div>
          <input
            type="number"
            class="answer-input"
            id="q1_1"
            placeholder="x = ?"
          />
        </div>
        <!-- Добавляйте другие вопросы -->
        <button class="check-button" onclick="checkTest('test1', [4, 5, 8])">
          Проверить работу
        </button>
        <div class="result" id="result1"></div>
      </div>

      <!-- Дополнительные разделы с заданиями... -->
    </div>
    <script>
      document.getElementById("currentDate").textContent =
        new Date().toLocaleDateString("ru-RU");
      function toggleTest(testId) {
        const allTests = document.querySelectorAll(".test-content");
        const allButtons = document.querySelectorAll(".test-button");
        allTests.forEach((test) => {
          if (test.id !== testId) {
            test.classList.remove("active");
          }
        });
        allButtons.forEach((button) => {
          if (button.getAttribute("onclick") !== `toggleTest('${testId}')`) {
            button.classList.remove("active");
          }
        });

        const test = document.getElementById(testId);
        const button = document.querySelector(
          `[onclick="toggleTest('${testId}')"]`,
        );
        if (test.classList.contains("active")) {
          test.classList.remove("active");
          button.classList.remove("active");
        } else {
          test.classList.add("active");
          button.classList.add("active");
        }
      }

      function checkTest(testId, correctAnswers) {
        const testNumber = testId.replace("test", "");
        let correctCount = 0;
        const userAnswers = [];
        for (let i = 1; i <= 3; i++) {
          const input = document.getElementById(`q${testNumber}_${i}`);
          const userAnswer = parseFloat(input.value);
          userAnswers.push(userAnswer);
          if (Math.abs(userAnswer - correctAnswers[i - 1]) < 0.01) {
            correctCount++;
            input.style.borderColor = "#48bb78";
            input.style.backgroundColor = "#f0fff4";
          } else {
            input.style.borderColor = "#f56565";
            input.style.backgroundColor = "#fff5f5";
          }
          input.disabled = true;
        }

        let grade;
        if (correctCount === 0) {
          grade = 2;
        } else if (correctCount === 1) {
          grade = 3;
        } else if (correctCount === 2) {
          grade = 4;
        } else {
          grade = 5;
        }

        // Показать результат
        const resultDiv = document.getElementById(`result${testNumber}`);
        let message, className;
        switch (grade) {
          case 2:
            message = "Неудовлетворительно";
            className = "grade-2";
            break;
          case 3:
            message = "Удовлетворительно";
            className = "grade-3";
            break;
          case 4:
            message = "Хорошо";
            className = "grade-4";
            break;
          case 5:
            message = "Отлично";
            className = "grade-5";
            break;
        }
        resultDiv.innerHTML = `
          <div>Правильные ответы: ${correctCount} из 3</div>
          <div>Оценка: ${grade} - ${message}</div>
          <div style="margin-top: 10px; font-size: 1rem;">
            ${grade === 5 ? "🎉 Превосходно!" : grade >= 4 ? "👍 Хорошая работа!" : "💪 Продолжайте изучать материал!"}
          </div>
        `;
        resultDiv.className = `show ${className}`;

        // Отметить тест как выполненный
        const button = document.querySelector(
          `[onclick="toggleTest('${testId}')"]`,
        );
        button.classList.add("completed");

        const checkButton = document.querySelector(
          `[onclick="checkTest('${testId}', [${correctAnswers.join(", ")}])"]`,
        );
        checkButton.disabled = true;
        checkButton.textContent = "Работа выполнена";
      }
    </script>
  </body>
</html>
