<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Линейные уравнения - Обучение и проверка</title>
    <style>
      html {
        height: 100%;
      }
      body {
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 20px;
        background: linear-gradient(
          135deg,
          #2c3e50 0%,
          #34495e 50%,
          #2c3e50 100%
        );
        min-height: 100%;
        color: #ecf0f1;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
        color: white;
        font-size: 2.5rem;
        margin-bottom: 40px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      .student-info {
        background: rgba(52, 73, 94, 0.8);
        border: 1px solid rgba(236, 240, 241, 0.1);
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 30px;
        text-align: center;
      }

      .student-name {
        font-size: 1.3rem;
        font-weight: bold;
        margin-bottom: 10px;
      }

      .student-info input {
        padding: 8px;
        margin-bottom: 10px;
        border-radius: 5px;
        border: 1px solid #ddd;
        background: rgba(44, 62, 80, 0.6);
        color: white;
        width: 100%;
      }

      .student-info button {
        background: #1abc9c;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
      }

      .student-info button:disabled {
        background-color: #7f8c8d;
        cursor: not-allowed;
      }

      .confirmed-info {
        display: none;
        margin-top: 20px;
      }

      .confirmed-info p {
        margin: 10px 0;
        font-size: 1.1rem;
      }

      .confirmed-info span {
        font-weight: bold;
      }

      .video-section {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-bottom: 50px;
        flex-wrap: wrap;
      }

      .video-card {
        background: rgba(52, 73, 94, 0.8);
        border: 1px solid rgba(236, 240, 241, 0.1);
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        transition: transform 0.3s ease;
        max-width: 350px;
      }

      .video-card:hover {
        transform: translateY(-5px);
      }

      .video-placeholder {
        width: 100%;
        height: 200px;
        background: linear-gradient(45deg, #f0f0f0, #e0e0e0);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 15px;
        border: 2px solid #ddd;
      }

      .video-title {
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 15px;
        text-align: center;
        color: #ecf0f1;
      }

      .test-links {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .test-button {
        background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
        color: #ecf0f1;
        border: 1px solid rgba(236, 240, 241, 0.2);
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 500;
        transition: all 0.3s ease;
        text-align: left;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 5px;
        position: relative;
      }

      .test-button:hover {
        transform: translateX(5px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        border-color: rgba(236, 240, 241, 0.4);
      }

      .test-button.active {
        background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%);
        border-color: #1abc9c;
      }

      .test-button.completed {
        background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
        border-color: #27ae60;
      }

      .test-status {
        position: absolute;
        top: -5px;
        right: -5px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #27ae60;
        color: white;
        font-size: 12px;
        display: none;
        align-items: center;
        justify-content: center;
        font-weight: bold;
      }

      .test-button.completed .test-status {
        display: flex;
      }

      .arrow {
        transition: transform 0.3s ease;
      }

      .test-button.active .arrow {
        transform: rotate(90deg);
      }

      .test-content {
        background: rgba(52, 73, 94, 0.9);
        border: 1px solid rgba(236, 240, 241, 0.1);
        margin: 20px 0;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        display: none;
        animation: slideDown 0.3s ease;
      }

      .test-content.active {
        display: block;
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .test-title {
        font-size: 1.5rem;
        font-weight: bold;
        margin-bottom: 25px;
        text-align: center;
        color: #ecf0f1;
        border-bottom: 2px solid rgba(236, 240, 241, 0.2);
        padding-bottom: 10px;
      }

      .question {
        background: rgba(44, 62, 80, 0.6);
        border-left: 4px solid #1abc9c;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 0 10px 10px 0;
        border: 1px solid rgba(236, 240, 241, 0.1);
      }

      .question-text {
        font-size: 1.1rem;
        margin-bottom: 15px;
        font-weight: 500;
      }

      .answer-input {
        width: 100%;
        max-width: 200px;
        padding: 10px 15px;
        border: 2px solid rgba(236, 240, 241, 0.3);
        border-radius: 8px;
        font-size: 1rem;
        background: rgba(44, 62, 80, 0.8);
        color: #ecf0f1;
        transition: border-color 0.3s ease;
      }

      .answer-input:focus {
        outline: none;
        border-color: #1abc9c;
        box-shadow: 0 0 0 3px rgba(26, 188, 156, 0.2);
      }

      .answer-input::placeholder {
        color: rgba(236, 240, 241, 0.6);
      }

      .answer-input:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .check-button {
        background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 1.1rem;
        font-weight: 600;
        margin: 20px auto;
        display: block;
        transition: all 0.3s ease;
      }

      .check-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(72, 187, 120, 0.4);
      }

      .check-button:disabled {
        background: #95a5a6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .result {
        text-align: center;
        font-size: 1.3rem;
        font-weight: bold;
        padding: 20px;
        border-radius: 10px;
        margin-top: 20px;
        display: none;
      }

      .result.show {
        display: block;
        animation: fadeIn 0.5s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .grade-2 {
        background: #ffebee;
        color: #c62828;
      }
      .grade-3 {
        background: #fed7d7;
        color: #c53030;
      }
      .grade-4 {
        background: #feebc8;
        color: #dd6b20;
      }
      .grade-5 {
        background: #c6f6d5;
        color: #38a169;
      }

      .progress-report {
        background: rgba(52, 73, 94, 0.9);
        border: 1px solid rgba(236, 240, 241, 0.1);
        border-radius: 15px;
        padding: 30px;
        margin-top: 50px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      .progress-title {
        font-size: 2rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: 30px;
        color: #ecf0f1;
        border-bottom: 2px solid rgba(236, 240, 241, 0.2);
        padding-bottom: 15px;
      }

      .progress-section {
        margin-bottom: 30px;
      }

      .progress-section h3 {
        font-size: 1.3rem;
        margin-bottom: 15px;
        color: #1abc9c;
      }

      .progress-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 15px;
        margin-bottom: 8px;
        background: rgba(44, 62, 80, 0.6);
        border-radius: 8px;
        border-left: 4px solid transparent;
      }

      .progress-item.completed {
        border-left-color: #27ae60;
      }

      .progress-item.not-completed {
        border-left-color: #95a5a6;
        opacity: 0.7;
      }

      .progress-grade {
        font-weight: bold;
        padding: 5px 10px;
        border-radius: 5px;
        min-width: 40px;
        text-align: center;
      }

      .grade-badge-2 {
        background: #c62828;
        color: white;
      }
      .grade-badge-3 {
        background: #c53030;
        color: white;
      }
      .grade-badge-4 {
        background: #dd6b20;
        color: white;
      }
      .grade-badge-5 {
        background: #38a169;
        color: white;
      }

      .overall-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 30px;
        margin-bottom: 30px;
      }

      .stat-card {
        background: rgba(44, 62, 80, 0.6);
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        border: 1px solid rgba(236, 240, 241, 0.1);
      }

      .stat-number {
        font-size: 2rem;
        font-weight: bold;
        color: #1abc9c;
      }

      .stat-label {
        font-size: 0.9rem;
        color: #bdc3c7;
        margin-top: 5px;
      }

      @media (max-width: 768px) {
        .video-section {
          flex-direction: column;
          align-items: center;
        }
        h1 {
          font-size: 2rem;
        }
        .container {
          padding: 0 10px;
        }
        .overall-stats {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>📐 Линейные уравнения</h1>

      <!-- Формы для ввода данных ученика -->
      <div class="student-info">
        <label for="studentNameInput">Ученик:</label>
        <input
          type="text"
          id="studentNameInput"
          placeholder="Введите имя и фамилию"
        />
        <label for="classInput">Класс:</label>
        <input type="text" id="classInput" placeholder="Введите класс" />
        <label for="dateInput">Дата:</label>
        <input type="date" id="dateInput" />
        <button id="confirmButton">Подтвердить данные</button>
        <div class="confirmed-info">
          <p>Ученик: <span id="confirmedStudentName"></span></p>
          <p>Класс: <span id="confirmedClass"></span></p>
          <p>Дата: <span id="confirmedDate"></span></p>
        </div>
      </div>

      <!-- Видео и задания (как раньше) -->
    </div>

    <script>
      document
        .getElementById("confirmButton")
        .addEventListener("click", function () {
          // Получаем введенные данные
          const studentName = document.getElementById("studentNameInput").value;
          const studentClass = document.getElementById("classInput").value;
          const studentDate = document.getElementById("dateInput").value;

          // Проверка на пустые поля
          if (!studentName || !studentClass || !studentDate) {
            alert("Пожалуйста, заполните все поля!");
            return;
          }

          // Записываем подтвержденные данные
          document.getElementById("confirmedStudentName").textContent =
            studentName;
          document.getElementById("confirmedClass").textContent = studentClass;
          document.getElementById("confirmedDate").textContent = studentDate;

          // Прячем поля ввода и кнопку
          document.getElementById("studentNameInput").disabled = true;
          document.getElementById("classInput").disabled = true;
          document.getElementById("dateInput").disabled = true;
          document.getElementById("confirmButton").disabled = true;

          // Показываем подтвержденные данные
          document.querySelector(".confirmed-info").style.display = "block";
        });
    </script>
  </body>
</html>
